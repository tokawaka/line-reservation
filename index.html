<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約</title>

<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --accent: #c8602a;
    --muted: #9a9080;
    --line: #d4ccc0;
    --available: #2d6a4f;
    --booked: #b5b0a8;
    --hover-bg: #fff8f0;
    --card: #fffdf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 100%;
    background: var(--accent);
    clip-path: polygon(30% 0, 100% 0, 100% 100%, 0% 100%);
    opacity: 0.15;
  }
  .header-label {
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.08em;
    line-height: 1.4;
  }
  .header-sub {
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.1em;
  }

  /* Steps */
  .steps {
    display: flex;
    padding: 16px 24px;
    gap: 0;
    border-bottom: 1px solid var(--line);
    background: var(--card);
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }
  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 11px;
    right: -50%;
    width: 100%;
    height: 1px;
    background: var(--line);
  }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 10px;
    background: var(--paper);
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .step.active .step-num {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .step.done .step-num {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .step-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    font-weight: 300;
  }
  .step.active .step-label { color: var(--ink); }

  /* Sections */
  .section {
    display: none;
    padding: 24px;
    animation: fadeUp 0.35s ease;
  }
  .section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* Calendar */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .cal-month {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.1em;
  }
  .cal-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    color: var(--ink);
  }
  .cal-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 10px;
    color: var(--muted);
    padding: 6px 0;
    letter-spacing: 0.05em;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    font-weight: 300;
  }
  .cal-day:hover:not(.empty):not(.past) {
    background: var(--hover-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .cal-day.empty { cursor: default; }
  .cal-day.past { color: var(--line); cursor: not-allowed; }
  .cal-day.today {
    font-weight: 600;
    color: var(--accent);
  }
  .cal-day.selected {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .cal-day.sun { color: #c0392b; }
  .cal-day.sat { color: #2980b9; }
  .cal-day.selected { color: var(--paper) !important; }

  /* Time slots */
  .selected-date-display {
    background: var(--ink);
    color: var(--paper);
    color: var(--paper);
    padding: 14px 18px;
    border-radius: 6px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .selected-date-display .date-text {
    font-size: 15px;
    letter-spacing: 0.08em;
  }
  .selected-date-display .change-btn {
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 10px;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-decoration: underline;
  }

  .loading-msg {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .loading-msg .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--line);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .slots-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .slot-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    align-items: center;
  }
  .slot-time {
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    padding-right: 10px;
    border-right: 1px solid var(--line);
    line-height: 1;
    padding-top: 2px;
  }
  .slot-cells {
    display: block;
  }
  .slot-cell {
    width: 100%;
    height: 48px;
    font-size: 14px;
    border-radius: 6px;
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }
  .slot-cell.available {
    border-color: var(--available);
    color: var(--available);
    background: rgba(45,106,79,0.04);
  }
  .slot-cell.available:hover {
    background: var(--available);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(45,106,79,0.25);
  }
  .slot-cell.booked {
    border-color: var(--line);
    color: var(--booked);
    background: var(--paper);
    cursor: not-allowed;
  }
  .slot-cell.booked::after {
    content: '×';
    position: absolute;
    font-size: 18px;
    opacity: 0.15;
  }
  .slot-cell.selected-slot {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200,96,42,0.3);
  }

  .slots-legend {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }
  .legend-dot.av { background: var(--available); }
  .legend-dot.bk { background: var(--booked); }

  /* Confirm section */
  .confirm-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .confirm-card-header {
    background: var(--accent);
    color: var(--paper);
    padding: 14px 18px;
    font-size: 12px;
    letter-spacing: 0.15em;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    text-transform: uppercase;
  }
  .confirm-rows {
    padding: 0;
  }
  .confirm-row {
    display: flex;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    align-items: flex-start;
    gap: 12px;
  }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    min-width: 80px;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    padding-top: 2px;
  }
  .confirm-value {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .name-input-wrap {
    margin-bottom: 20px;
  }
  .name-input-wrap label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    margin-bottom: 8px;
  }
  .name-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 15px;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus {
    border-color: var(--ink);
  }
  .name-input::placeholder { color: var(--line); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--paper);
    border: none;
    border-radius: 6px;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary::after {
    content: '→';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
  }

  /* Success */
  .success-wrap {
    text-align: center;
    padding: 40px 24px;
  }
  .success-icon {
    width: 64px; height: 64px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    color: white;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .success-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.05em;
  }
  .success-detail {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    margin: 24px 0;
    text-align: left;
  }
  .success-detail p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: 'Meiryo', 'メイリオ', sans-serif;
    letter-spacing: 0.05em;
  }
  .success-detail strong {
    font-size: 16px;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: 0.08em;
  }

  .error-msg {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    color: #991b1b;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    display: none;
  }

  /* 会員情報バナー */
  .member-banner {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .member-banner.hidden { display: none; }
  .member-name {
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .member-name span {
    font-size: 11px;
    color: var(--muted);
    margin-right: 4px;
  }
  .member-remaining {
    font-size: 13px;
    color: var(--available);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .member-remaining.zero { color: var(--accent); }

  /* 予約不可バナー */
  .blocked-banner {
    margin: 24px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    display: none;
  }
  .blocked-banner.visible { display: block; }
  .blocked-banner-title {
    font-size: 15px;
    color: #991b1b;
    margin-bottom: 8px;
  }
  .blocked-banner-sub {
    font-size: 12px;
    color: #b91c1c;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Reservation System</div>
  <h1>ご予約</h1>
  <div class="header-sub">10:00 – 22:00 ／ 1時間枠 ／ 各枠3名まで</div>
</div>

<div class="member-banner hidden" id="memberBanner">
  <div class="member-name"><span>会員</span><span id="memberName">—</span> さん</div>
  <div class="member-remaining" id="memberRemaining">—</div>
</div>

<div class="blocked-banner" id="blockedBanner">
  <div class="blocked-banner-title" id="blockedTitle">予約できません</div>
  <div class="blocked-banner-sub" id="blockedSub"></div>
</div>

<div class="steps">
  <div class="step active" id="step1">
    <div class="step-num">1</div>
    <div class="step-label">日付</div>
  </div>
  <div class="step" id="step2">
    <div class="step-num">2</div>
    <div class="step-label">時間</div>
  </div>
  <div class="step" id="step3">
    <div class="step-num">3</div>
    <div class="step-label">確認</div>
  </div>
</div>

<!-- Step 1: Date -->
<div class="section visible" id="sec1">
  <div class="section-title">日付を選択</div>
  <div class="cal-nav">
    <button class="cal-btn" id="prevMonth">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="cal-btn" id="nextMonth">›</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">日</div>
    <div class="cal-dow">月</div>
    <div class="cal-dow">火</div>
    <div class="cal-dow">水</div>
    <div class="cal-dow">木</div>
    <div class="cal-dow">金</div>
    <div class="cal-dow">土</div>
  </div>
  <div class="cal-grid" id="calDays"></div>
</div>

<!-- Step 2: Time -->
<div class="section" id="sec2">
  <div class="selected-date-display">
    <div class="date-text" id="selectedDateText">—</div>
    <div class="change-btn" onclick="goStep(1)">変更</div>
  </div>
  <div class="section-title">時間を選択</div>
  <div class="slots-legend">
    <span><span class="legend-dot av"></span>空きあり</span>
    <span><span class="legend-dot bk"></span>満席</span>
  </div>
  <div id="slotsArea">
    <div class="loading-msg"><div class="spinner"></div>空き状況を確認中...</div>
  </div>
</div>

<!-- Step 3: Confirm -->
<div class="section" id="sec3">
  <div class="section-title">予約内容の確認</div>
  <div class="confirm-card">
    <div class="confirm-card-header">Booking Details</div>
    <div class="confirm-rows">
      <div class="confirm-row">
        <div class="confirm-label">DATE</div>
        <div class="confirm-value" id="cfDate">—</div>
      </div>
      <div class="confirm-row">
        <div class="confirm-label">TIME</div>
        <div class="confirm-value" id="cfTime">—</div>
      </div>
    </div>
  </div>
  <div class="name-input-wrap">
    <label>お名前（LINE表示名）</label>
    <input type="text" class="name-input" id="nameInput" placeholder="例：山田 太郎">
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="btn-primary" id="bookBtn" onclick="submitBooking()">予約を確定する</button>
</div>

<!-- Step 4: Done -->
<div class="section" id="sec4">
  <div class="success-wrap">
    <div class="success-icon">✓</div>
    <div class="success-title">ご予約が完了しました</div>
    <div class="success-detail">
      <p>DATE</p>
      <strong id="doneDate">—</strong>
      <br><br>
      <p>TIME</p>
      <strong id="doneTime">—</strong>
      <br><br>
      <p>NAME</p>
      <strong id="doneName">—</strong>
    </div>
    <div class="success-sub">
      ご予約の確認メッセージを<br>LINEにてお送りします。
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — ここを環境に合わせて変更してください
// ============================================================
const CONFIG = {
  GET_SLOTS_URL: 'https://tokawaka.app.n8n.cloud/webhook/get-slots',
  BOOK_URL: 'https://tokawaka.app.n8n.cloud/webhook/book',
  GET_USER_INFO_URL: 'https://tokawaka.app.n8n.cloud/webhook/get-user-info',
  LINE_USER_ID: new URLSearchParams(location.search).get('userId') || '',
  START_HOUR: 10,
  END_HOUR: 22,
  MAX_PER_SLOT: 3,
};
// ============================================================

const DAYS_JP = ['日','月','火','水','木','金','土'];
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let state = {
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  selectedDate: null,   // Date object
  selectedHour: null,   // number (10–21)
  slotData: {},         // { 'HH': count } from API
};

// ---- Calendar ----
function renderCalendar() {
  const { viewYear, viewMonth } = state;
  document.getElementById('calMonth').textContent =
    `${viewYear}年 ${MONTHS_JP[viewMonth]}`;

  const first = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  let html = '';
  for (let i = 0; i < first; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const dow = date.getDay();
    const isPast = date < today;
    const isToday = date.getTime() === today.getTime();
    const isSel = state.selectedDate &&
      date.getTime() === state.selectedDate.getTime();
    let cls = 'cal-day';
    if (isPast) cls += ' past';
    else if (dow === 0) cls += ' sun';
    else if (dow === 6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    const onclick = isPast ? '' : `onclick="selectDate(${viewYear},${viewMonth},${d})"`;
    html += `<div class="${cls}" ${onclick}>${d}</div>`;
  }
  document.getElementById('calDays').innerHTML = html;
}

document.getElementById('prevMonth').onclick = () => {
  if (state.viewMonth === 0) { state.viewYear--; state.viewMonth = 11; }
  else state.viewMonth--;
  renderCalendar();
};
document.getElementById('nextMonth').onclick = () => {
  if (state.viewMonth === 11) { state.viewYear++; state.viewMonth = 0; }
  else state.viewMonth++;
  renderCalendar();
};

function selectDate(y, m, d) {
  state.selectedDate = new Date(y, m, d);
  state.selectedHour = null;
  renderCalendar();
  goStep(2);
  loadSlots();
}

// ---- Slots ----
function formatDateJP(date) {
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${DAYS_JP[date.getDay()]}）`;
}
function pad(n) { return String(n).padStart(2,'0'); }

async function loadSlots() {
  const area = document.getElementById('slotsArea');
  area.innerHTML = '<div class="loading-msg"><div class="spinner"></div>空き状況を確認中...</div>';

  document.getElementById('selectedDateText').textContent =
    formatDateJP(state.selectedDate);

  const dateStr = `${state.selectedDate.getFullYear()}-${pad(state.selectedDate.getMonth()+1)}-${pad(state.selectedDate.getDate())}`;

  try {
    const res = await fetch(`${CONFIG.GET_SLOTS_URL}?date=${dateStr}&userId=${CONFIG.LINE_USER_ID}`);
    const raw = await res.json();
    // 配列で返ってくる場合は最初の要素を使う
    const data = Array.isArray(raw) ? raw[0] : raw;
    // 休館日チェック
    if (data.closed) {
      document.getElementById('slotsArea').innerHTML =
        '<div class="loading-msg">この日は休館日です。<br>別の日付をお選びください。</div>';
      return;
    }
    state.slotData = data;
    renderSlots();
  } catch(e) {
    document.getElementById('slotsArea').innerHTML =
      '<div class="loading-msg">空き状況の取得に失敗しました。<br>再度お試しください。</div>';
  }
}

function renderSlots() {
  const now = new Date();
  const isToday = state.selectedDate.toDateString() === now.toDateString();
  const currentHour = now.getHours();

  let html = '<div class="slots-grid">';
  for (let h = CONFIG.START_HOUR; h < CONFIG.END_HOUR; h++) {
    if (isToday && h <= currentHour) continue;
    const count = state.slotData[h] ?? 0;
    const remaining = CONFIG.MAX_PER_SLOT - count;
    html += `<div class="slot-row">
      <div class="slot-time">${pad(h)}:00</div>
      <div class="slot-cells">`;
    if (remaining <= 0) {
      html += `<div class="slot-cell booked">満席</div>`;
    } else {
      const isSel = state.selectedHour === h;
      html += `<div class="slot-cell available ${isSel ? 'selected-slot':''}" onclick="selectSlot(${h})">残り${remaining}枠</div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  document.getElementById('slotsArea').innerHTML = html;
}

function selectSlot(hour) {
  const count = state.slotData[hour] ?? 0;
  if (count >= CONFIG.MAX_PER_SLOT) return;
  state.selectedHour = hour;
  renderSlots();
  // auto-advance to step 3
  setTimeout(() => goStep(3), 300);
}

// ---- Confirm ----
function fillConfirm() {
  document.getElementById('cfDate').textContent = formatDateJP(state.selectedDate);
  document.getElementById('cfTime').textContent =
    `${pad(state.selectedHour)}:00 〜 ${pad(state.selectedHour+1)}:00`;
}

// ---- Book ----
async function submitBooking() {
  const name = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!name) {
    errEl.textContent = 'お名前を入力してください。';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('bookBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';

  const dateStr = `${state.selectedDate.getFullYear()}-${pad(state.selectedDate.getMonth()+1)}-${pad(state.selectedDate.getDate())}`;
  const payload = {
    userId: CONFIG.LINE_USER_ID,
    name,
    date: dateStr,
    hour: state.selectedHour,
    startTime: `${dateStr}T${pad(state.selectedHour)}:00:00+09:00`,
    endTime: `${dateStr}T${pad(state.selectedHour+1)}:00:00+09:00`,
  };

  try {
    const res = await fetch(CONFIG.BOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    // 200が返ってきたら成功扱い
    showSuccess(name);
  } catch(e) {
    errEl.textContent = '通信エラーが発生しました。再度お試しください。';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '予約を確定する';
  }
}

function showSuccess(name) {
  document.getElementById('doneDate').textContent = formatDateJP(state.selectedDate);
  document.getElementById('doneTime').textContent =
    `${pad(state.selectedHour)}:00 〜 ${pad(state.selectedHour+1)}:00`;
  document.getElementById('doneName').textContent = name;
  goStep(4);
}

// ---- Navigation ----
function goStep(n) {
  [1,2,3,4].forEach(i => {
    document.getElementById(`sec${i}`).classList.toggle('visible', i === n);
    const stepEl = document.getElementById(`step${i}`);
    if (stepEl) {
      stepEl.classList.remove('active','done');
      if (i === n) stepEl.classList.add('active');
      else if (i < n) stepEl.classList.add('done');
    }
  });
  if (n === 3) fillConfirm();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ---- Init ----
renderCalendar();
loadUserInfo();

async function loadUserInfo() {
  if (!CONFIG.LINE_USER_ID) return;
  try {
    const res = await fetch(`${CONFIG.GET_USER_INFO_URL}?userId=${CONFIG.LINE_USER_ID}`);
    const raw = await res.json();
    const data = Array.isArray(raw) ? raw[0] : raw;

    // 会員名表示
    document.getElementById('memberName').textContent = data.name || '';
    document.getElementById('memberBanner').classList.remove('hidden');

    // ステータスチェック
    const status = data.status || '';
    if (status === '退会') {
      showBlocked('ご利用いただけません', '退会済みのため予約できません。\nお問い合わせください。');
      return;
    }
    if (status === '休会') {
      showBlocked('休会中です', '休会期間中は予約できません。\n再開をお待ちしております。');
      return;
    }

    // 残り回数チェック
    const remaining = data.remaining ?? 0;
    const remainingEl = document.getElementById('memberRemaining');
    if (remaining <= 0) {
      remainingEl.textContent = '今月の予約上限に達しました';
      remainingEl.classList.add('zero');
      showBlocked('今月の予約上限に達しました', `今月はすでに${data.limit}回ご予約いただいています。\n来月またのご利用をお待ちしております。`);
    } else {
      remainingEl.textContent = `今月あと${remaining}回予約できます`;
    }
  } catch(e) {
    // エラー時は何も表示しない（予約は続行可能）
  }
}

function showBlocked(title, sub) {
  document.getElementById('blockedTitle').textContent = title;
  document.getElementById('blockedSub').textContent = sub;
  document.getElementById('blockedBanner').classList.add('visible');
  // ステップを非表示
  document.querySelector('.steps').style.display = 'none';
  document.getElementById('sec1').classList.remove('visible');
}
</script>
